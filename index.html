<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Email Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --surface2: #20243a;
      --border:   #2a2d3e;
      --accent:   #6c63ff;
      --accent-h: #8b85ff;
      --text:     #e8e9f0;
      --muted:    #8b8fa8;
      --success:  #3dd68c;
      --warn:     #f0a04b;
      --danger:   #ff6b6b;
      --radius:   12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 340px 1fr;
      grid-template-rows: auto 1fr auto;
      gap: 0;
    }

    /* ── Header ── */
    header {
      grid-column: 1 / -1;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
    }

    header h1 { font-size: 18px; font-weight: 700; }
    header .sub { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }

    /* ── Left panel ── */
    .sidebar {
      grid-column: 1;
      border-right: 1px solid var(--border);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    /* ── Main area ── */
    .main {
      grid-column: 2;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    /* ── Footer ── */
    footer {
      grid-column: 1 / -1;
      padding: 10px 28px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Recipient input ── */
    .recipient-row { display: flex; gap: 8px; }

    input[type="text"], input[type="password"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    input[type="text"]:focus, input[type="password"]:focus { border-color: var(--accent); }

    .detect-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      padding: 8px 12px;
      white-space: nowrap;
      transition: border-color 0.15s;
    }

    .detect-btn:hover { border-color: var(--accent); }

    /* ── Detected language display ── */
    .detected-lang {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent-h);
    }

    /* ── Language grid ── */
    .lang-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .lang-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      padding: 7px 4px;
      text-align: center;
      line-height: 1.5;
      transition: border-color 0.15s, background 0.15s;
    }

    .lang-btn:hover { border-color: var(--accent); background: #1f1d3a; }
    .lang-btn.active { border-color: var(--accent); background: #1f1d3a; color: var(--accent-h); }

    /* ── API key ── */
    .key-row { display: flex; gap: 8px; }

    .save-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      padding: 8px 12px;
      white-space: nowrap;
      transition: border-color 0.15s;
    }

    .save-btn:hover { border-color: var(--accent); }

    .key-status { font-size: 11px; font-family: 'DM Mono', monospace; }
    .key-status.ok   { color: var(--success); }
    .key-status.none { color: var(--muted); }

    /* ── Text areas ── */
    .textarea-wrap { display: flex; flex-direction: column; gap: 6px; flex: 1; }

    .textarea-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      padding: 14px 16px;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
      min-height: 200px;
      flex: 1;
    }

    textarea:focus { border-color: var(--accent); }

    #outputText {
      background: #0a1a12;
      border-color: #1a3a28;
      color: #c8f0d8;
      min-height: 200px;
    }

    /* ── Buttons ── */
    .translate-btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.03em;
      padding: 13px;
      transition: background 0.15s, opacity 0.15s;
      width: 100%;
    }

    .translate-btn:hover:not(:disabled) { background: var(--accent-h); }
    .translate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .copy-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 12px;
      transition: border-color 0.15s;
    }

    .copy-btn:hover { border-color: var(--success); color: var(--success); }
    .copy-btn.copied { border-color: var(--success); color: var(--success); }

    /* ── Status ── */
    .status {
      font-size: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      display: none;
      font-family: 'DM Mono', monospace;
    }

    .status.info    { display: block; background: #1a1d3a; color: var(--accent-h); border: 1px solid var(--accent); }
    .status.success { display: block; background: #0d2a1f; color: var(--success); border: 1px solid var(--success); }
    .status.error   { display: block; background: #2a0d0d; color: var(--danger); border: 1px solid var(--danger); }
    .status.warn    { display: block; background: #2a1d0d; color: var(--warn); border: 1px solid var(--warn); }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Two-column text area layout ── */
    .text-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      flex: 1;
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      body { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr auto; }
      .sidebar { grid-column: 1; border-right: none; border-bottom: 1px solid var(--border); }
      .main { grid-column: 1; }
      footer { grid-column: 1; }
      .text-columns { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div>
      <h1>🌐 AI Email Translator</h1>
      <div class="sub">Powered by Claude · Anthropic · gipper65.github.io/outlook-translator</div>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Recipient detection -->
    <div class="card">
      <div class="card-label">Recipient Email</div>
      <div class="recipient-row">
        <input type="text" id="recipientInput" placeholder="name@company.it" />
        <button class="detect-btn" id="detectBtn">Detect</button>
      </div>
      <div class="detected-lang" id="detectedLang">—</div>
    </div>

    <!-- Language override -->
    <div class="card">
      <div class="card-label">Select Language</div>
      <div class="lang-grid" id="langGrid"></div>
    </div>

    <!-- Translate -->
    <button class="translate-btn" id="translateBtn" disabled>Translate</button>

    <!-- Status -->
    <div class="status" id="status"></div>

    <!-- API Key -->
    <div class="card">
      <div class="card-label">Anthropic API Key</div>
      <div class="key-row">
        <input type="password" id="apiKeyInput" placeholder="sk-ant-…" autocomplete="off" />
        <button class="save-btn" id="saveKeyBtn">Save</button>
      </div>
      <div class="key-status none" id="keyStatus">No key saved</div>
    </div>

  </aside>

  <!-- Main -->
  <main class="main">
    <div class="text-columns">

      <div class="textarea-wrap">
        <div class="textarea-label">
          <span>Original Email</span>
          <button class="copy-btn" id="clearBtn">Clear</button>
        </div>
        <textarea id="inputText" placeholder="Paste your email here…"></textarea>
      </div>

      <div class="textarea-wrap">
        <div class="textarea-label">
          <span>Translation</span>
          <button class="copy-btn" id="copyBtn">Copy</button>
        </div>
        <textarea id="outputText" placeholder="Translation will appear here…" readonly></textarea>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer>
    <span>API key stored in browser localStorage only · Never leaves your machine except to api.anthropic.com</span>
    <span id="charCount">0 characters</span>
  </footer>

  <script>
    // ─── Language → Domain mapping ────────────────────────────────────────────
    const DOMAIN_LANG_MAP = [
      { fragments: ['.it', 'italy', 'italia', 'fosber'],    lang: 'it', name: 'Italian',    flag: '🇮🇹' },
      { fragments: ['.fr', 'france', 'french', 'franche'],  lang: 'fr', name: 'French',     flag: '🇫🇷' },
      { fragments: ['.de', 'germany', 'german', 'deutsch'], lang: 'de', name: 'German',     flag: '🇩🇪' },
      { fragments: ['.es', 'spain', 'espana'],              lang: 'es', name: 'Spanish',    flag: '🇪🇸' },
      { fragments: ['.pt', 'portugal', 'brasil', '.br'],    lang: 'pt', name: 'Portuguese', flag: '🇵🇹' },
      { fragments: ['.cn', 'china', 'chinese', '.tw'],      lang: 'zh', name: 'Chinese',    flag: '🇨🇳' },
      { fragments: ['.jp', 'japan', 'japanese'],            lang: 'ja', name: 'Japanese',   flag: '🇯🇵' },
      { fragments: ['.nl', 'dutch', 'holland', 'nether'],   lang: 'nl', name: 'Dutch',      flag: '🇳🇱' },
    ];

    const ALL_LANGS = [
      { lang: 'it', name: 'Italian',    flag: '🇮🇹' },
      { lang: 'fr', name: 'French',     flag: '🇫🇷' },
      { lang: 'de', name: 'German',     flag: '🇩🇪' },
      { lang: 'es', name: 'Spanish',    flag: '🇪🇸' },
      { lang: 'pt', name: 'Portuguese', flag: '🇵🇹' },
      { lang: 'zh', name: 'Chinese',    flag: '🇨🇳' },
      { lang: 'ja', name: 'Japanese',   flag: '🇯🇵' },
      { lang: 'nl', name: 'Dutch',      flag: '🇳🇱' },
    ];

    const DISCLAIMERS = {
      it: ['This email was translated using AI (Claude by Anthropic). Please verify any critical information.',
           'Questa email è stata tradotta tramite intelligenza artificiale (Claude di Anthropic). Si prega di verificare le informazioni importanti.'],
      fr: ['This email was translated using AI (Claude by Anthropic). Please verify any critical information.',
           'Cet e-mail a été traduit par intelligence artificielle (Claude d\'Anthropic). Veuillez vérifier les informations importantes.'],
      de: ['This email was translated using AI (Claude by Anthropic). Please verify any critical information.',
           'Diese E-Mail wurde mithilfe von KI (Claude von Anthropic) übersetzt. Bitte überprüfen Sie alle wichtigen Informationen.'],
      es: ['This email was translated using AI (Claude by Anthropic). Please verify any critical information.',
           'Este correo electrónico fue traducido con IA (Claude de Anthropic). Por favor, verifique cualquier información crítica.'],
      pt: ['This email was translated using AI (Claude by Anthropic). Please verify any critical information.',
           'Este e-mail foi traduzido com IA (Claude da Anthropic). Por favor, verifique quaisquer informações importantes.'],
      zh: ['This email was translated using AI (Claude by Anthropic). Please verify any critical information.',
           '本邮件由人工智能（Anthropic的Claude）翻译。请核实任何重要信息。'],
      ja: ['This email was translated using AI (Claude by Anthropic). Please verify any critical information.',
           'このメールはAI（AnthropicのClaude）によって翻訳されました。重要な情報は必ずご確認ください。'],
      nl: ['This email was translated using AI (Claude by Anthropic). Please verify any critical information.',
           'Deze e-mail is vertaald met behulp van AI (Claude van Anthropic). Controleer alle kritieke informatie.'],
    };

    // ─── State ────────────────────────────────────────────────────────────────
    let selectedLang  = null;
    let isTranslating = false;

    // ─── DOM refs ─────────────────────────────────────────────────────────────
    const recipientInput = document.getElementById('recipientInput');
    const detectBtn      = document.getElementById('detectBtn');
    const detectedLangEl = document.getElementById('detectedLang');
    const langGridEl     = document.getElementById('langGrid');
    const translateBtn   = document.getElementById('translateBtn');
    const statusEl       = document.getElementById('status');
    const inputText      = document.getElementById('inputText');
    const outputText     = document.getElementById('outputText');
    const apiKeyInput    = document.getElementById('apiKeyInput');
    const saveKeyBtn     = document.getElementById('saveKeyBtn');
    const keyStatusEl    = document.getElementById('keyStatus');
    const copyBtn        = document.getElementById('copyBtn');
    const clearBtn       = document.getElementById('clearBtn');
    const charCount      = document.getElementById('charCount');

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function showStatus(msg, type = 'info') {
      statusEl.textContent = msg;
      statusEl.className   = `status ${type}`;
    }

    function detectLangFromEmail(email) {
      const lower = email.toLowerCase();
      for (const entry of DOMAIN_LANG_MAP) {
        if (entry.fragments.some(f => lower.includes(f))) return entry;
      }
      return null;
    }

    function selectLang(langObj) {
      selectedLang = langObj;
      document.querySelectorAll('.lang-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.lang === langObj.lang)
      );
      translateBtn.disabled = false;
    }

    // ─── Language grid ────────────────────────────────────────────────────────
    function buildLangGrid() {
      ALL_LANGS.forEach(l => {
        const btn = document.createElement('button');
        btn.className    = 'lang-btn';
        btn.dataset.lang = l.lang;
        btn.innerHTML    = `${l.flag}<br>${l.name}`;
        btn.addEventListener('click', () => {
          selectLang(l);
          detectedLangEl.textContent = `${l.flag} ${l.name}`;
        });
        langGridEl.appendChild(btn);
      });
    }

    // ─── Detect from recipient ────────────────────────────────────────────────
    function detectFromRecipient() {
      const email = recipientInput.value.trim();
      if (!email) { showStatus('Enter a recipient email first.', 'warn'); return; }
      const match = detectLangFromEmail(email);
      if (match) {
        detectedLangEl.textContent = `${match.flag} ${match.name}`;
        selectLang(match);
        showStatus(`Detected: ${match.name} from "${email}"`, 'success');
      } else {
        detectedLangEl.textContent = '— unknown domain';
        showStatus('Domain not recognised — select a language manually.', 'warn');
      }
    }

    detectBtn.addEventListener('click', detectFromRecipient);
    recipientInput.addEventListener('keydown', e => { if (e.key === 'Enter') detectFromRecipient(); });

    // ─── Character counter ────────────────────────────────────────────────────
    inputText.addEventListener('input', () => {
      charCount.textContent = `${inputText.value.length.toLocaleString()} characters`;
    });

    // ─── Clear ────────────────────────────────────────────────────────────────
    clearBtn.addEventListener('click', () => {
      inputText.value  = '';
      outputText.value = '';
      charCount.textContent = '0 characters';
      statusEl.className = 'status';
    });

    // ─── Copy output ──────────────────────────────────────────────────────────
    copyBtn.addEventListener('click', async () => {
      if (!outputText.value) return;
      await navigator.clipboard.writeText(outputText.value);
      copyBtn.textContent = 'Copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 2000);
    });

    // ─── API key ──────────────────────────────────────────────────────────────
    function loadApiKey() {
      const saved = localStorage.getItem('anthropic_api_key');
      if (saved) {
        apiKeyInput.value    = '••••••••••••••••';
        keyStatusEl.textContent = '✓ Key saved';
        keyStatusEl.className   = 'key-status ok';
      }
    }

    function getApiKey() {
      const typed = apiKeyInput.value.trim();
      if (typed && !typed.startsWith('••')) return typed;
      return localStorage.getItem('anthropic_api_key') || '';
    }

    saveKeyBtn.addEventListener('click', () => {
      const key = apiKeyInput.value.trim();
      if (!key || key.startsWith('••')) { showStatus('Enter your API key first.', 'warn'); return; }
      if (!key.startsWith('sk-ant-'))   { showStatus('Key should start with sk-ant-', 'warn'); return; }
      localStorage.setItem('anthropic_api_key', key);
      apiKeyInput.value    = '••••••••••••••••';
      keyStatusEl.textContent = '✓ Key saved';
      keyStatusEl.className   = 'key-status ok';
      showStatus('API key saved.', 'success');
    });

    // ─── Translation ──────────────────────────────────────────────────────────
    async function translate() {
      if (!selectedLang || isTranslating) return;

      const apiKey = getApiKey();
      if (!apiKey) { showStatus('No API key — enter and save it below.', 'error'); return; }

      const text = inputText.value.trim();
      if (text.length < 3) { showStatus('Paste your email text first.', 'warn'); return; }

      isTranslating = true;
      translateBtn.disabled  = true;
      translateBtn.innerHTML = '<span class="spinner"></span>Translating…';
      showStatus(`Calling Claude · translating to ${selectedLang.name}…`, 'info');
      outputText.value = '';

      try {
        const translation = await callClaudeAPI(apiKey, text, selectedLang);
        outputText.value = buildOutput(text, translation, selectedLang);
        showStatus(`✓ Translated to ${selectedLang.flag} ${selectedLang.name}. Copy and paste into your email.`, 'success');
      } catch (err) {
        showStatus(`Error: ${err.message}`, 'error');
      } finally {
        isTranslating = false;
        translateBtn.disabled  = false;
        translateBtn.textContent = 'Translate';
      }
    }

    async function callClaudeAPI(apiKey, text, langObj) {
      const prompt = `You are a professional email translator. Translate the following email body into ${langObj.name} (language code: ${langObj.lang}).

Rules:
- Translate only the body text — preserve the meaning, tone, and structure.
- Do NOT add any preamble, explanation, or notes — output ONLY the translated text.
- Preserve paragraph breaks.

Email to translate:
---
${text}
---`;

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key':         apiKey,
          'anthropic-version': '2023-06-01',
          'content-type':      'application/json',
          'anthropic-dangerous-direct-browser-calls': 'true',
        },
        body: JSON.stringify({
          model:      'claude-sonnet-4-20250514',
          max_tokens: 2000,
          messages:   [{ role: 'user', content: prompt }],
        }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err?.error?.message || `API error ${response.status}`);
      }

      const data = await response.json();
      return data.content?.[0]?.text?.trim() || '';
    }

    function buildOutput(original, translation, langObj) {
      const d = DISCLAIMERS[langObj.lang] || [
        'This email was translated using AI (Claude by Anthropic). Please verify any critical information.',
        `(Translation to ${langObj.name})`,
      ];
      const line = '─'.repeat(52);
      return [
        original.trim(),
        '',
        line,
        `🌐 ${langObj.flag} ${langObj.name} Translation  ·  AI — Claude by Anthropic`,
        line,
        '',
        translation.trim(),
        '',
        line,
        `⚠️  ${d[0]}`,
        `⚠️  ${d[1]}`,
        line,
      ].join('\n');
    }

    translateBtn.addEventListener('click', translate);

    // ─── Init ─────────────────────────────────────────────────────────────────
    buildLangGrid();
    loadApiKey();
  </script>
</body>
</html>
