<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Translator</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3e;
      --accent:    #6c63ff;
      --accent-h:  #8b85ff;
      --text:      #e8e9f0;
      --muted:     #8b8fa8;
      --success:   #3dd68c;
      --warn:      #f0a04b;
      --danger:    #ff6b6b;
      --radius:    10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      min-height: 100vh;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .detected-lang {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent-h);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .detected-recipients {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lang-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .lang-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      padding: 6px 4px;
      text-align: center;
      transition: border-color 0.15s, background 0.15s;
      line-height: 1.4;
    }

    .lang-btn:hover { border-color: var(--accent); background: #1f1d3a; }
    .lang-btn.active { border-color: var(--accent); background: #1f1d3a; color: var(--accent-h); }

    .translate-btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.03em;
      padding: 11px;
      transition: background 0.15s, opacity 0.15s;
      width: 100%;
    }

    .translate-btn:hover:not(:disabled) { background: var(--accent-h); }
    .translate-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .status {
      font-size: 11px;
      padding: 8px 10px;
      border-radius: 7px;
      display: none;
    }

    .status.info    { display: block; background: #1a1d3a; color: var(--accent-h); border: 1px solid var(--accent); }
    .status.success { display: block; background: #0d2a1f; color: var(--success); border: 1px solid var(--success); }
    .status.error   { display: block; background: #2a0d0d; color: var(--danger); border: 1px solid var(--danger); }
    .status.warn    { display: block; background: #2a1d0d; color: var(--warn); border: 1px solid var(--warn); }

    .api-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    input[type="password"], input[type="text"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      flex: 1;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus, input[type="text"]:focus {
      border-color: var(--accent);
    }

    .save-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      padding: 7px 12px;
      white-space: nowrap;
      transition: border-color 0.15s;
    }

    .save-btn:hover { border-color: var(--accent); }

    .key-status {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
    }

    .key-status.ok   { color: var(--success); }
    .key-status.none { color: var(--muted); }

    .divider { border: none; border-top: 1px solid var(--border); }

    .footer {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      font-family: 'DM Mono', monospace;
    }

    #spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div>
    <h1>🌐 AI Translator</h1>
    <div class="subtitle">Powered by Claude · Anthropic</div>
  </div>

  <!-- Detected Language -->
  <div class="card" id="detectedCard">
    <div class="card-label">Detected Target Language</div>
    <div class="detected-lang" id="detectedLang">—</div>
    <div class="detected-recipients" id="detectedRecipients">Loading recipients…</div>
  </div>

  <!-- Manual Override -->
  <div class="card">
    <div class="card-label">Override Language</div>
    <div class="lang-grid" id="langGrid"></div>
  </div>

  <!-- Translate Button -->
  <button class="translate-btn" id="translateBtn" disabled>Translate Email</button>

  <!-- Status -->
  <div class="status" id="status"></div>

  <!-- API Key -->
  <hr class="divider" />
  <div class="card">
    <div class="card-label">Anthropic API Key</div>
    <div class="api-row">
      <input type="password" id="apiKeyInput" placeholder="sk-ant-…" autocomplete="off" />
      <button class="save-btn" id="saveKeyBtn">Save</button>
    </div>
    <div class="key-status none" id="keyStatus">No key saved</div>
  </div>

  <div class="footer">Keys stored locally · Never sent to any server except Anthropic</div>

  <script>
    // ─── Language → Domain mapping ────────────────────────────────────────────
    // Add entries here to auto-detect a language from a recipient email/domain.
    // `fragments` is a list of substrings matched against the full email address.
    const DOMAIN_LANG_MAP = [
      { fragments: ['.it', 'italy', 'italia', 'fosber'],   lang: 'it', name: 'Italian',    flag: '🇮🇹' },
      { fragments: ['.fr', 'france', 'french', 'franche'], lang: 'fr', name: 'French',     flag: '🇫🇷' },
      { fragments: ['.de', 'germany', 'german', 'deutsch'],lang: 'de', name: 'German',     flag: '🇩🇪' },
      { fragments: ['.es', 'spain', 'espana', 'spain'],    lang: 'es', name: 'Spanish',    flag: '🇪🇸' },
      { fragments: ['.pt', 'portugal', 'brasil', '.br'],   lang: 'pt', name: 'Portuguese', flag: '🇵🇹' },
      { fragments: ['.cn', 'china', 'chinese', '.tw'],     lang: 'zh', name: 'Chinese',    flag: '🇨🇳' },
      { fragments: ['.jp', 'japan', 'japanese'],           lang: 'ja', name: 'Japanese',   flag: '🇯🇵' },
      { fragments: ['.nl', 'dutch', 'holland', 'nether'],  lang: 'nl', name: 'Dutch',      flag: '🇳🇱' },
    ];

    // All supported languages for manual override grid
    const ALL_LANGS = [
      { lang: 'it', name: 'Italian',    flag: '🇮🇹' },
      { lang: 'fr', name: 'French',     flag: '🇫🇷' },
      { lang: 'de', name: 'German',     flag: '🇩🇪' },
      { lang: 'es', name: 'Spanish',    flag: '🇪🇸' },
      { lang: 'pt', name: 'Portuguese', flag: '🇵🇹' },
      { lang: 'zh', name: 'Chinese',    flag: '🇨🇳' },
      { lang: 'ja', name: 'Japanese',   flag: '🇯🇵' },
      { lang: 'nl', name: 'Dutch',      flag: '🇳🇱' },
    ];

    // ─── Bilingual disclaimers ────────────────────────────────────────────────
    const DISCLAIMERS = {
      it: ['This email was translated using AI (Claude by Anthropic). Please verify any critical information.',
           'Questa email è stata tradotta tramite intelligenza artificiale (Claude di Anthropic). Si prega di verificare le informazioni importanti.'],
      fr: ['This email was translated using AI (Claude by Anthropic). Please verify any critical information.',
           'Cet e-mail a été traduit par intelligence artificielle (Claude d\'Anthropic). Veuillez vérifier les informations importantes.'],
      de: ['This email was translated using AI (Claude by Anthropic). Please verify any critical information.',
           'Diese E-Mail wurde mithilfe von KI (Claude von Anthropic) übersetzt. Bitte überprüfen Sie alle wichtigen Informationen.'],
      es: ['This email was translated using AI (Claude by Anthropic). Please verify any critical information.',
           'Este correo electrónico fue traducido con IA (Claude de Anthropic). Por favor, verifique cualquier información crítica.'],
      pt: ['This email was translated using AI (Claude by Anthropic). Please verify any critical information.',
           'Este e-mail foi traduzido com IA (Claude da Anthropic). Por favor, verifique quaisquer informações importantes.'],
      zh: ['This email was translated using AI (Claude by Anthropic). Please verify any critical information.',
           '本邮件由人工智能（Anthropic的Claude）翻译。请核实任何重要信息。'],
      ja: ['This email was translated using AI (Claude by Anthropic). Please verify any critical information.',
           'このメールはAI（AnthropicのClaude）によって翻訳されました。重要な情報は必ずご確認ください。'],
      nl: ['This email was translated using AI (Claude by Anthropic). Please verify any critical information.',
           'Deze e-mail is vertaald met behulp van AI (Claude van Anthropic). Controleer alle kritieke informatie.'],
    };

    // ─── State ────────────────────────────────────────────────────────────────
    let selectedLang   = null;   // { lang, name, flag }
    let detectedLang   = null;
    let isTranslating  = false;

    // ─── DOM refs ─────────────────────────────────────────────────────────────
    const detectedLangEl      = document.getElementById('detectedLang');
    const detectedRecipientsEl= document.getElementById('detectedRecipients');
    const langGridEl           = document.getElementById('langGrid');
    const translateBtn         = document.getElementById('translateBtn');
    const statusEl             = document.getElementById('status');
    const apiKeyInput          = document.getElementById('apiKeyInput');
    const saveKeyBtn           = document.getElementById('saveKeyBtn');
    const keyStatusEl          = document.getElementById('keyStatus');

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function showStatus(msg, type = 'info') {
      statusEl.textContent = msg;
      statusEl.className   = `status ${type}`;
    }

    function clearStatus() {
      statusEl.className = 'status';
    }

    function getLangByCode(code) {
      return ALL_LANGS.find(l => l.lang === code) || null;
    }

    function detectLangFromEmail(email) {
      const lower = email.toLowerCase();
      for (const entry of DOMAIN_LANG_MAP) {
        if (entry.fragments.some(f => lower.includes(f))) {
          return entry;
        }
      }
      return null;
    }

    // ─── Build language grid ──────────────────────────────────────────────────
    function buildLangGrid() {
      langGridEl.innerHTML = '';
      ALL_LANGS.forEach(l => {
        const btn = document.createElement('button');
        btn.className   = 'lang-btn';
        btn.dataset.lang = l.lang;
        btn.innerHTML   = `${l.flag}<br>${l.name}`;
        btn.addEventListener('click', () => selectLang(l, true));
        langGridEl.appendChild(btn);
      });
    }

    function selectLang(langObj, fromManual = false) {
      selectedLang = langObj;
      document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === langObj.lang);
      });
      if (fromManual) {
        detectedLangEl.textContent = `${langObj.flag} ${langObj.name}`;
        detectedRecipientsEl.textContent = 'Manually selected';
      }
      translateBtn.disabled = false;
    }

    // ─── Load recipients via Office.js ────────────────────────────────────────
    function loadRecipients() {
      if (typeof Office === 'undefined' || !Office.context || !Office.context.mailbox) {
        // Running outside Outlook — demo mode
        detectedLangEl.textContent = '— (demo mode)';
        detectedRecipientsEl.textContent = 'No Office context detected';
        return;
      }

      const item = Office.context.mailbox.item;
      const toField = item.to;

      toField.getAsync(result => {
        if (result.status !== Office.AsyncResultStatus.Succeeded) {
          detectedRecipientsEl.textContent = 'Could not read recipients';
          return;
        }

        const recipients = result.value; // array of { displayName, emailAddress }
        if (!recipients || recipients.length === 0) {
          detectedLangEl.textContent = '— (no recipients)';
          detectedRecipientsEl.textContent = 'Add a recipient to auto-detect language';
          return;
        }

        const emails = recipients.map(r => r.emailAddress);
        detectedRecipientsEl.textContent = emails.join(', ');

        // Try each recipient in order until we find a match
        for (const email of emails) {
          const match = detectLangFromEmail(email);
          if (match) {
            detectedLang = match;
            detectedLangEl.textContent = `${match.flag} ${match.name}`;
            selectLang(match, false);
            return;
          }
        }

        detectedLangEl.textContent = '— (unknown domain)';
        detectedRecipientsEl.textContent = emails.join(', ') + ' · Select manually ↑';
      });
    }

    // ─── API key persistence ──────────────────────────────────────────────────
    function loadApiKey() {
      const saved = localStorage.getItem('anthropic_api_key');
      if (saved) {
        apiKeyInput.value = '••••••••••••••••';
        keyStatusEl.textContent = '✓ Key saved';
        keyStatusEl.className   = 'key-status ok';
      } else {
        keyStatusEl.textContent = 'No key saved';
        keyStatusEl.className   = 'key-status none';
      }
    }

    function getApiKey() {
      // If user typed a new value (not the masked placeholder), use it
      const typed = apiKeyInput.value.trim();
      if (typed && !typed.startsWith('••')) return typed;
      return localStorage.getItem('anthropic_api_key') || '';
    }

    saveKeyBtn.addEventListener('click', () => {
      const key = apiKeyInput.value.trim();
      if (!key || key.startsWith('••')) {
        showStatus('Please enter your API key first.', 'warn');
        return;
      }
      if (!key.startsWith('sk-ant-')) {
        showStatus('Key should start with sk-ant-', 'warn');
        return;
      }
      localStorage.setItem('anthropic_api_key', key);
      apiKeyInput.value = '••••••••••••••••';
      keyStatusEl.textContent = '✓ Key saved';
      keyStatusEl.className   = 'key-status ok';
      showStatus('API key saved to browser storage.', 'success');
    });

    // ─── Translation ──────────────────────────────────────────────────────────
    async function translateEmail() {
      if (!selectedLang || isTranslating) return;

      const apiKey = getApiKey();
      if (!apiKey) {
        showStatus('No API key. Enter and save your Anthropic key below.', 'error');
        return;
      }

      isTranslating = true;
      translateBtn.disabled = true;
      translateBtn.innerHTML = '<span id="spinner"></span>Translating…';
      showStatus('Reading email body…', 'info');

      try {
        const body = await getEmailBody();
        if (!body || body.trim().length < 3) {
          showStatus('Email body is empty. Write your email first.', 'warn');
          return;
        }

        showStatus(`Translating to ${selectedLang.name} via Claude…`, 'info');

        const translation = await callClaudeAPI(apiKey, body, selectedLang);
        const withDisclaimer = buildOutput(body, translation, selectedLang);

        await setEmailBody(withDisclaimer);
        showStatus(`✓ Translated to ${selectedLang.flag} ${selectedLang.name} successfully.`, 'success');

      } catch (err) {
        showStatus(`Error: ${err.message}`, 'error');
      } finally {
        isTranslating = false;
        translateBtn.disabled = false;
        translateBtn.textContent = 'Translate Email';
      }
    }

    function getEmailBody() {
      return new Promise((resolve, reject) => {
        Office.context.mailbox.item.body.getAsync('text', result => {
          if (result.status !== Office.AsyncResultStatus.Succeeded) {
            reject(new Error('Could not read email body'));
          } else {
            resolve(result.value);
          }
        });
      });
    }

    function setEmailBody(newBody) {
      return new Promise((resolve, reject) => {
        Office.context.mailbox.item.body.setAsync(newBody, { coercionType: 'text' }, result => {
          if (result.status !== Office.AsyncResultStatus.Succeeded) {
            reject(new Error('Could not update email body'));
          } else {
            resolve();
          }
        });
      });
    }

    async function callClaudeAPI(apiKey, text, langObj) {
      const prompt = `You are a professional email translator. Translate the following email body into ${langObj.name} (language code: ${langObj.lang}).

Rules:
- Translate only the body text — preserve the meaning, tone, and any formatting.
- Do NOT add any preamble, explanation, or notes — output ONLY the translated text.
- Preserve line breaks and paragraph structure.

Email to translate:
---
${text}
---`;

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key':         apiKey,
          'anthropic-version': '2023-06-01',
          'content-type':      'application/json',
          'anthropic-dangerous-direct-browser-calls': 'true',
        },
        body: JSON.stringify({
          model:      'claude-sonnet-4-20250514',
          max_tokens: 2000,
          messages: [{ role: 'user', content: prompt }],
        }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err?.error?.message || `API error ${response.status}`);
      }

      const data = await response.json();
      return data.content?.[0]?.text?.trim() || '';
    }

    function buildOutput(original, translation, langObj) {
      const d = DISCLAIMERS[langObj.lang] || [
        'This email was translated using AI (Claude by Anthropic). Please verify any critical information.',
        `(Translation to ${langObj.name})`,
      ];

      const line = '─'.repeat(48);
      return [
        original.trim(),
        '',
        line,
        `🌐 ${langObj.flag} ${langObj.name} Translation (AI — Claude by Anthropic)`,
        line,
        '',
        translation.trim(),
        '',
        line,
        `⚠️  ${d[0]}`,
        `⚠️  ${d[1]}`,
        line,
      ].join('\n');
    }

    // ─── Event listeners ──────────────────────────────────────────────────────
    translateBtn.addEventListener('click', translateEmail);

    // ─── Init ─────────────────────────────────────────────────────────────────
    function init() {
      buildLangGrid();
      loadApiKey();

      if (typeof Office !== 'undefined') {
        Office.onReady(() => loadRecipients());
      } else {
        loadRecipients(); // will handle no-Office case
      }
    }

    init();
  </script>
</body>
</html>
